workflows:
  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      groups:
        - SUPABASE

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Verify workflow
        script: |
          echo "Running macOS release workflow"
          echo "Branch: $CM_BRANCH"
          echo "Commit: $CM_COMMIT"
          pwd

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Verify required environment variables
        script: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"

      - name: Build macOS release
        script: |
          flutter build macos --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

      - name: Zip macOS app
        script: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(find . -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_NAME" ]; then
            echo "No .app bundle found in build output"
            exit 1
          fi
          zip -r stock-app-macos.zip "$APP_NAME"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/stock-app-macos.zip

  windows-release:
    name: Windows Release
    max_build_duration: 60
    instance_type: windows_x2

    environment:
      flutter: stable
      groups:
        - SUPABASE

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Verify workflow
        script: |
          echo Running Windows release workflow
          echo Branch: %CM_BRANCH%
          echo Commit: %CM_COMMIT%
          cd

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Verify required environment variables
        script: |
          if [ -z "%SUPABASE_URL%" ] exit /b 1
          if [ -z "%SUPABASE_ANON_KEY%" ] exit /b 1

      - name: Build Windows release
        script: |
          flutter build windows --release --dart-define=SUPABASE_URL=%SUPABASE_URL% --dart-define=SUPABASE_ANON_KEY=%SUPABASE_ANON_KEY%

      - name: Zip Windows app
        script: |
          powershell -Command "Compress-Archive -Path 'build\\windows\\x64\\runner\\Release\\*' -DestinationPath 'build\\windows\\x64\\runner\\Release\\stock-app-windows.zip' -Force"

    artifacts:
      - build/windows/x64/runner/Release/stock-app-windows.zip
