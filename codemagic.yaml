workflows:
  yaml-auto-native:
    name: YAML Auto Native Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Verify YAML workflow is running
        script: |
          echo "Running workflow from codemagic.yaml"
          echo "Branch: $CM_BRANCH"
          echo "Commit: $CM_COMMIT"
          pwd
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Regenerate native projects
        script: |
          echo "Regenerating Android/iOS native folders to guarantee fresh project files..."
          flutter create --platforms=android,ios --overwrite .

          echo "Native folders after regeneration step:"
          [ -d android ] && echo "- android exists" || echo "- android missing"
          [ -d ios ] && echo "- ios exists" || echo "- ios missing"
          [ -d ios/Runner.xcodeproj ] && echo "- ios/Runner.xcodeproj exists" || echo "- ios/Runner.xcodeproj missing"
      - name: Build Android APK
        script: |
          echo "Ensuring Gradle wrapper JAR exists after flutter create..."
          gradle -p android wrapper --gradle-version 8.10.2 --distribution-type bin
          test -s android/gradle/wrapper/gradle-wrapper.jar

          flutter build apk --debug
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/**/outputs/**/*.apk
      - build/ios/iphoneos/*.app
      - flutter_drive.log
